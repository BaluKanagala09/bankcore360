server:
  port: 8761

spring:
  application:
    name: eureka-server
#  config:
#    import: optional:configserver:http://localhost:8888

eureka:
  instance:
    hostname: localhost
  client:
    # This IS the Eureka server — don't register with itself
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/

  server:
    # Wait before evicting instances (useful in dev)
    eviction-interval-timer-in-ms: 10000
    # Disable self-preservation in dev (enable in prod)
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN