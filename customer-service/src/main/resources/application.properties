spring.application.name=customer-service

//MYSQL

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


//JWT
#app.jwt.secret=bankcore360-super-secret-key-must-be-at-least-256-bits-long-for-hs256

app.jwt.expiration-ms=864000000


//DB

spring.datasource.url=jdbc:mysql://localhost:3306/bankcore360_customer?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

//LOGGER


logging.level.org.cts.bankcore360=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/bankcore360.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

//SWAGGER

springdoc.swagger-ui.server-url=http://localhost:8082/api/v1
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

//ACTUATOR

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

//AUTHSERVICECLIENT

auth.service.base-url=http://localhost:8083/api/v1
auth.service.connect-timeout-ms=3000
auth.service.read-timeout-ms=5000
internal.service.token=customer-service-internal-token
app.jwt.forward=true


server.port=8082
server.servlet.context-path=/api/v1