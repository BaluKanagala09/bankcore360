springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.cts.transactionservice: DEBUG
    org.springframework.security: INFO

